<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADVANCED MULTI-ENGINE DORKING SUITE</title>
    <style>
        :root {
            --bg-main: #0d1117;
            --bg-card: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #1f6feb;
            --success: #238636;
            --danger: #da3633;
            --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            padding: 20px;
            line-height: 1.5;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        /* Header */
        .header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 { font-family: var(--font-mono); font-size: 1.5rem; color: var(--accent); letter-spacing: -0.5px; }
        .header p { font-size: 0.85rem; color: var(--text-muted); font-family: var(--font-mono); }
        .badge { background: rgba(88, 166, 255, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; border: 1px solid var(--accent); font-family: var(--font-mono); font-weight: bold; }

        /* Input Grid */
        .target-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .panel-title { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; font-weight: 600; }
        
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; font-family: var(--font-mono); }
        .input-group input {
            width: 100%; background: var(--bg-main); border: 1px solid var(--border);
            padding: 10px 12px; color: var(--text-main); border-radius: 6px;
            font-family: var(--font-mono); font-size: 0.85rem; outline: none; transition: border 0.2s;
        }
        .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
        
        .actions { margin-top: 20px; display: flex; gap: 10px; }
        button {
            padding: 10px 16px; border-radius: 6px; border: 1px solid transparent;
            font-family: var(--font-mono); font-size: 0.8rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: var(--success); color: #fff; border-color: rgba(240,246,252,0.1); }
        .btn-primary:hover { background: #2ea043; }
        .btn-clear { background: var(--bg-main); color: var(--text-muted); border-color: var(--border); }
        .btn-clear:hover { border-color: var(--text-muted); color: var(--text-main); }

        /* Dork Output Sections */
        .dork-category { margin-bottom: 30px; display: none; }
        .category-title {
            font-size: 1rem; color: var(--text-main); border-bottom: 1px solid var(--border);
            padding-bottom: 8px; margin-bottom: 15px; font-family: var(--font-mono);
        }

        .dork-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .dork-card:hover { border-color: #58a6ff50; }
        
        .dork-header { display: flex; justify-content: space-between; align-items: center; }
        .dork-title { font-size: 0.85rem; font-weight: 600; color: var(--accent); }
        
        .dork-code-container { display: flex; gap: 10px; }
        .dork-code {
            flex-grow: 1; background: var(--bg-main); padding: 10px; border-radius: 6px;
            border: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.8rem;
            color: #7ee787; word-break: break-all;
        }
        .btn-copy {
            background: var(--bg-main); border: 1px solid var(--border); color: var(--text-muted);
            padding: 0 15px; cursor: pointer; border-radius: 6px;
        }
        .btn-copy:hover { color: var(--text-main); border-color: var(--text-muted); }

        /* Multi-Engine Execution */
        .engine-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
        .engine-btn {
            background: var(--bg-main); border: 1px solid var(--border); color: var(--text-muted);
            padding: 6px 12px; border-radius: 4px; font-size: 0.75rem; text-decoration: none;
            display: inline-block; font-family: var(--font-mono);
        }
        .engine-btn.google:hover { border-color: #4285F4; color: #4285F4; }
        .engine-btn.yandex:hover { border-color: #FC3F1D; color: #FC3F1D; }
        .engine-btn.bing:hover { border-color: #0089D6; color: #0089D6; }
        .engine-btn.duck:hover { border-color: #DE5833; color: #DE5833; }

        #empty-state {
            text-align: center; padding: 40px; color: var(--text-muted);
            border: 1px dashed var(--border); border-radius: 8px; font-family: var(--font-mono);
        }

        @media (max-width: 768px) {
            .dork-code-container { flex-direction: column; }
            .btn-copy { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>ADVANCED DORKING SUITE</h1>
            <p>Multi-Engine Boolean Query Generator</p>
        </div>
        <div class="badge">LIVE GENERATION MODE</div>
    </div>

    <div class="target-panel">
        <div class="panel-title">Target Parameters</div>
        <div class="input-grid">
            <div class="input-group">
                <label>Nama Lengkap</label>
                <input type="text" id="name" placeholder="John Doe">
            </div>
            <div class="input-group">
                <label>Username / Alias</label>
                <input type="text" id="username" placeholder="johndoe99">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="text" id="email" placeholder="target@email.com">
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" id="phone" placeholder="0812 / 62812">
            </div>
            <div class="input-group">
                <label>Domain / Company</label>
                <input type="text" id="domain" placeholder="example.com">
            </div>
            <div class="input-group">
                <label>NIK / National ID</label>
                <input type="text" id="nik" placeholder="16 Digit Number">
            </div>
        </div>
        <div class="actions">
            <button class="btn-primary" onclick="generateDorks()">Generate Dorks</button>
            <button class="btn-clear" onclick="clearAll()">Clear Data</button>
        </div>
    </div>

    <div id="empty-state">Masukkan setidaknya satu parameter target untuk melakukan generate dork.</div>
    <div id="results-container"></div>

</div>

<script>
    const engines = {
        Google: "https://www.google.com/search?q=",
        Yandex: "https://yandex.com/search/?text=",
        Bing: "https://www.bing.com/search?q=",
        Duck: "https://duckduckgo.com/?q="
    };

    function clearAll() {
        document.querySelectorAll('input').forEach(i => i.value = '');
        document.getElementById('results-container').innerHTML = '';
        document.getElementById('empty-state').style.display = 'block';
    }

    async function copyToClipboard(text, btn) {
        try {
            await navigator.clipboard.writeText(text);
            const originalText = btn.innerText;
            btn.innerText = 'Copied!';
            btn.style.color = 'var(--success)';
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.color = '';
            }, 1500);
        } catch (err) {
            console.error('Failed to copy', err);
        }
    }

    function createCategory(title) {
        const wrap = document.createElement('div');
        wrap.className = 'dork-category';
        wrap.style.display = 'block';
        wrap.innerHTML = `<div class="category-title">[+] ${title}</div>`;
        return wrap;
    }

    function createDorkCard(title, dorkString) {
        let engineLinks = '';
        for (const [name, url] of Object.entries(engines)) {
            const classEngine = name.toLowerCase();
            engineLinks += `<a href="${url}${encodeURIComponent(dorkString)}" target="_blank" class="engine-btn ${classEngine}">Execute on ${name}</a>`;
        }

        const safeDorkString = dorkString.replace(/"/g, '&quot;');

        const card = document.createElement('div');
        card.className = 'dork-card';
        card.innerHTML = `
            <div class="dork-header">
                <span class="dork-title">${title}</span>
            </div>
            <div class="dork-code-container">
                <div class="dork-code">${dorkString}</div>
                <button class="btn-copy" onclick="copyToClipboard('${safeDorkString}', this)">Copy</button>
            </div>
            <div class="engine-bar">
                ${engineLinks}
            </div>
        `;
        return card;
    }

    function generateDorks() {
        const data = {
            name: document.getElementById('name').value.trim(),
            username: document.getElementById('username').value.trim(),
            email: document.getElementById('email').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            domain: document.getElementById('domain').value.trim(),
            nik: document.getElementById('nik').value.trim()
        };

        const container = document.getElementById('results-container');
        container.innerHTML = '';

        const hasData = Object.values(data).some(val => val !== '');
        if (!hasData) {
            document.getElementById('empty-state').style.display = 'block';
            return;
        } else {
            document.getElementById('empty-state').style.display = 'none';
        }

        // --- 1. DOCUMENTS & LEAKS ---
        const catDocs = createCategory('EXPOSED DOCUMENTS & LEAKED DATABASES');
        let docsAdded = false;

        if (data.email || data.username || data.domain) {
            const target = data.email || data.domain || data.username;
            catDocs.appendChild(createDorkCard('Database Dumps (SQL/CSV/Log)', `"${target}" (ext:sql OR ext:csv OR ext:log OR ext:txt) intext:"password" | intext:"hash"`));
            catDocs.appendChild(createDorkCard('Pastebin / Code Repo Leaks', `"${target}" site:pastebin.com OR site:github.com OR site:gitlab.com`));
            catDocs.appendChild(createDorkCard('Cloud Storage Exposure', `"${target}" site:s3.amazonaws.com OR site:drive.google.com OR site:docs.google.com`));
            docsAdded = true;
        }
        
        if (data.name || data.nik) {
            const target = data.nik ? `"${data.nik}"` : `"${data.name}"`;
            catDocs.appendChild(createDorkCard('Confidential Government / Office PDF/XLS', `${target} (ext:pdf OR ext:xls OR ext:xlsx) (intext:"rahasia" OR intext:"confidential" OR site:go.id)`));
            docsAdded = true;
        }

        if (docsAdded) container.appendChild(catDocs);


        // --- 2. SOCIAL MEDIA & PROFILES ---
        const catSocial = createCategory('SOCIAL MEDIA & PROFESSIONAL PROFILES');
        let socialAdded = false;

        if (data.username) {
            catSocial.appendChild(createDorkCard('Cross-Platform Profiling', `"${data.username}" (site:linkedin.com OR site:twitter.com OR site:instagram.com OR site:tiktok.com OR site:facebook.com)`));
            catSocial.appendChild(createDorkCard('Gaming & Forums', `"${data.username}" (site:steamcommunity.com OR site:reddit.com OR site:discord.com)`));
            socialAdded = true;
        }
        if (data.name) {
            catSocial.appendChild(createDorkCard('Exact Name Mentions on Socials', `"${data.name}" (site:linkedin.com OR site:instagram.com)`));
            socialAdded = true;
        }

        if (socialAdded) container.appendChild(catSocial);


        // --- 3. INFRASTRUCTURE & DOMAIN ---
        const catInfra = createCategory('INFRASTRUCTURE & DIRECTORIES');
        let infraAdded = false;

        if (data.domain) {
            catInfra.appendChild(createDorkCard('Directory Traversal (Open Directories)', `intitle:"index of" "${data.domain}"`));
            catInfra.appendChild(createDorkCard('Configuration Files Exposure', `site:${data.domain} ext:env OR ext:xml OR ext:json OR ext:yml`));
            catInfra.appendChild(createDorkCard('Subdomain Indexing', `site:*.${data.domain} -www`));
            infraAdded = true;
        }

        if (infraAdded) container.appendChild(catInfra);


        // --- 4. PHONE & IDENTIFICATION (INDONESIAN CONTEXT) ---
        const catId = createCategory('COMMUNICATIONS & REGIONAL IDENTIFICATION');
        let idAdded = false;

        if (data.phone) {
            let clean = data.phone.replace(/\D/g, '');
            let v1 = clean;
            let v2 = clean.startsWith('0') ? '62' + clean.substring(1) : clean;
            let v3 = "+" + v2;
            catId.appendChild(createDorkCard('Phone Number Variations Mentions', `"${v1}" OR "${v2}" OR "${v3}" -site:trucaller.com`));
            idAdded = true;
        }

        if (data.nik) {
            catId.appendChild(createDorkCard('KPU / Dukcapil Deep Index', `intext:"${data.nik}" (site:kpu.go.id OR site:desa.id OR site:kab.go.id)`));
            idAdded = true;
        }

        if (idAdded) container.appendChild(catId);
    }

    // Trigger generate on enter key inside input fields
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                generateDorks();
            }
        });
    });
</script>

</body>
</html>
