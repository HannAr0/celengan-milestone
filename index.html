<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate OSINT Web Framework</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --danger: #f85149;
            --success: #3fb950;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .input-group {
            background: var(--card);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: var(--accent);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        #results {
            margin-top: 20px;
        }

        .result-card {
            background: var(--card);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
        }

        .result-card h3 {
            margin-top: 0;
            font-size: 1.1em;
            color: var(--success);
        }

        .engine-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .engine-links a {
            padding: 5px 12px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.85em;
        }

        .engine-links a:hover {
            background: var(--accent);
            color: white;
        }

        .direct-link {
            background: #238636 !important;
            color: white !important;
        }

        footer {
            text-align: center;
            font-size: 0.8em;
            margin-top: 30px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>OSINT Multi-Engine</h2>
        <p>Targeting & Dorking Tool</p>
    </header>

    <div class="input-group">
        <label>Nama Lengkap</label>
        <input type="text" id="fullName" placeholder="Contoh: Budi Santoso">
        
        <label>Nomor HP</label>
        <input type="text" id="phone" placeholder="Contoh: 0812...">

        <label>Username</label>
        <input type="text" id="username" placeholder="Contoh: budisantoso99">

        <label>Lokasi / Kota</label>
        <input type="text" id="location" placeholder="Contoh: Surabaya">

        <label>NIK / Identitas</label>
        <input type="text" id="nik" placeholder="Opsional">

        <button onclick="generateOSINT()">GENERATE INVESTIGATION LINKS</button>
    </div>

    <div id="results"></div>

    <footer>
        OSINT Framework - Client Side Only (Privacy Friendly)
    </footer>
</div>

<script>
    function generateOSINT() {
        const name = document.getElementById('fullName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const username = document.getElementById('username').value.trim();
        const location = document.getElementById('location').value.trim();
        const nik = document.getElementById('nik').value.trim().replace(/\D/g, '');

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = ''; // Reset hasil

        const engines = {
            "Google": "https://www.google.com/search?q=",
            "Yandex": "https://yandex.com/search/?text=",
            "Bing": "https://www.bing.com/search?q=",
            "DuckDuckGo": "https://duckduckgo.com/?q="
        };

        let dorks = [];

        // 1. Pivot Nama
        if (name) {
            dorks.push({
                title: "[NAMA] Pencarian Umum & Dokumen",
                query: `"${name}" (ext:pdf OR ext:xlsx OR ext:doc)`
            });
        }

        // 2. Pivot HP
        if (phone) {
            let cleanPhone = phone.replace(/\D/g, '');
            if (cleanPhone.startsWith('0')) cleanPhone = '62' + cleanPhone.slice(1);
            
            dorks.push({
                title: "[HP] E-Commerce & Forum",
                query: `"${phone}" OR "${cleanPhone}" site:tokopedia.com OR site:shopee.co.id OR site:kaskus.co.id`
            });
            dorks.push({
                title: "[HP] Jejak Penipuan / Blacklist",
                query: `"${phone}" OR "${cleanPhone}" (penipu OR blacklist OR lapor)`
            });

            // Direct Link WhatsApp & Telegram
            const directCard = document.createElement('div');
            directCard.className = 'result-card';
            directCard.style.borderColor = '#3fb950';
            directCard.innerHTML = `
                <h3>[DIRECT] Social Chat</h3>
                <div class="engine-links">
                    <a href="https://wa.me/${cleanPhone}" target="_blank" class="direct-link">WhatsApp</a>
                    <a href="https://t.me/+${cleanPhone}" target="_blank" class="direct-link">Telegram</a>
                </div>
            `;
            resultsDiv.appendChild(directCard);
        }

        // 3. Pivot Username
        if (username) {
            dorks.push({
                title: "[USER] Profiling Sosmed",
                query: `"${username}" site:facebook.com OR site:instagram.com OR site:x.com OR site:github.com`
            });
        }

        // 4. Pivot NIK & Lokasi
        if (nik) {
            dorks.push({ title: "[NIK] Exact Match", query: `"${nik}"` });
        }
        if (name && location) {
            dorks.push({ title: "[CROSS] Nama + Lokasi", query: `"${name}" AND "${location}"` });
        }

        // Render Dorks ke UI
        dorks.forEach(dork => {
            const card = document.createElement('div');
            card.className = 'result-card';
            
            let linksHtml = `<div class="engine-links">`;
            for (let [engine, url] of Object.entries(engines)) {
                const fullUrl = url + encodeURIComponent(dork.query);
                linksHtml += `<a href="${fullUrl}" target="_blank">${engine}</a>`;
            }
            linksHtml += `</div>`;

            card.innerHTML = `
                <h3>${dork.title}</h3>
                <p style="font-size:0.8em; color:#8b949e; word-break:break-all;">Query: ${dork.query}</p>
                ${linksHtml}
            `;
            resultsDiv.appendChild(card);
        });

        if (dorks.length === 0) {
            resultsDiv.innerHTML = '<p style="text-align:center; color:var(--danger);">Isi setidaknya satu kotak untuk mencari!</p>';
        }
    }
</script>

</body>
</html>
