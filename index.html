<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA Web Player - Simple Version</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        #emulator-wrapper { width: 100%; max-width: 800px; height: 500px; margin: 20px auto; background: #000; border: 2px solid #444; }
        .controls { background: #252525; padding: 15px; margin: 10px; border-radius: 8px; display: inline-block; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 4px; background: #27ae60; color: white; font-weight: bold; }
        button.download { background: #2980b9; }
        button.upload { background: #8e44ad; }
        input[type="file"] { display: none; }
        .label-btn { padding: 10px 15px; background: #e67e22; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>GBA Player (Tanpa Ribet)</h1>

    <div class="controls">
        <label class="label-btn"> Pilih File .GBA
            <input type="file" id="rom-file" accept=".gba">
        </label>
        
        <button class="download" onclick="downloadSave()">⬇️ Download Save (.sav)</button>
        <label class="label-btn" style="background:#8e44ad"> ⬆️ Upload Save
            <input type="file" id="upload-save" accept=".sav">
        </label>
    </div>

    <div id="emulator-wrapper">
        <div id="game"></div>
    </div>

    <p style="color: #888; font-size: 0.8em;">Data otomatis tersimpan di browser ini (Auto-save).</p>

    <script>
        let EJS_player;

        document.getElementById('rom-file').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            window.EJS_player = "#game";
            window.EJS_core = "gba"; 
            window.EJS_gameUrl = URL.createObjectURL(file);
            window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
            window.EJS_startOnLoaded = true;

            // Memuat loader emulator
            let script = document.createElement("script");
            script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
            document.head.appendChild(script);
        };

        // Fungsi Download Save Data (.sav)
        function downloadSave() {
            if (!window.EJS_emulator) return alert("Jalankan game dulu!");
            
            // EmulatorJS menyimpan file secara virtual dengan nama 'game.sav'
            const data = window.EJS_emulator.getFile("game.sav");
            if (!data) return alert("Belum ada save data!");

            const blob = new Blob([data], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "savegame.sav";
            a.click();
        }

        // Fungsi Upload Save Data (.sav)
        document.getElementById('upload-save').onchange = function(e) {
            if (!window.EJS_emulator) return alert("Jalankan game dulu baru upload save!");
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const saveData = new Uint8Array(event.target.result);
                window.EJS_emulator.setFile("game.sav", saveData);
                alert("Save data berhasil di-upload! Silakan restart game atau load di dalam menu game.");
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
