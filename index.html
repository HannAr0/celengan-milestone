<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OSINT PRO | G-A07 Edition</title>
    <style>
        :root {
            --black: #000000;
            --dark-grey: #111111;
            --border: #222222;
            --accent: #3498db; /* Professional Blue */
            --text: #ffffff;
            --dim-text: #888888;
            --success: #2ecc71;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--black);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Container & Header */
        .app-container { padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
        
        header {
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 25px;
            text-align: left;
        }

        header h1 { font-size: 1.5rem; margin: 0; letter-spacing: -0.5px; font-weight: 700; }
        header span { color: var(--accent); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Input Styling */
        .input-card {
            background: var(--dark-grey);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: var(--dim-text); margin-bottom: 5px; text-transform: uppercase; font-weight: 600; }
        
        input {
            width: 100%;
            background: #080808;
            border: 1px solid var(--border);
            padding: 12px;
            color: white;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--accent); }

        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-reset {
            width: 100%;
            background: transparent;
            color: var(--dim-text);
            border: none;
            padding: 10px;
            margin-top: 5px;
            font-size: 0.8rem;
        }

        /* Result Modules */
        .module-title {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            margin: 30px 0 15px 0;
            font-weight: 800;
            letter-spacing: 1px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 5px;
        }

        .result-item {
            background: var(--dark-grey);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #1a1a1a;
        }

        .result-item h4 { margin: 0 0 8px 0; font-size: 0.95rem; font-weight: 600; color: #eee; }
        
        .query-preview {
            font-family: 'Monaco', monospace;
            font-size: 0.7rem;
            color: var(--dim-text);
            background: #000;
            padding: 8px;
            border-radius: 4px;
            display: block;
            margin-bottom: 12px;
            word-break: break-all;
        }

        .engine-bar { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .engine-bar a {
            flex: 1;
            min-width: 70px;
            text-align: center;
            padding: 8px;
            background: #222;
            color: white;
            text-decoration: none;
            font-size: 0.75rem;
            border-radius: 6px;
            font-weight: 600;
        }

        .engine-bar a:active { background: var(--accent); }

        /* Floating Notes */
        #notes-trigger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            width: 50px;
            height: 50px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { width: 0px; background: transparent; }

    </style>
</head>
<body>

<div class="app-container">
    <header>
        <span>Intelligence Framework</span>
        <h1>OSINT COMMAND</h1>
    </header>

    <div class="input-card">
        <div class="field">
            <label>Full Name</label>
            <input type="text" id="targetName" placeholder="Nama Lengkap">
        </div>
        <div class="field">
            <label>Username / Alias</label>
            <input type="text" id="targetUser" placeholder="Handle Sosmed">
        </div>
        <div class="field">
            <label>Phone Number</label>
            <input type="text" id="targetPhone" placeholder="0812xxxx">
        </div>
        <div class="field">
            <label>Identity (NIK/Email)</label>
            <input type="text" id="targetExtra" placeholder="NIK atau Email">
        </div>
        
        <button class="btn-primary" onclick="runInvestigation()">Start Reconnaissance</button>
        <button class="btn-reset" onclick="window.location.reload()">Clear Session</button>
    </div>

    <div id="output"></div>
</div>

<script>
    function runInvestigation() {
        const name = document.getElementById('targetName').value.trim();
        const user = document.getElementById('targetUser').value.trim();
        const phone = document.getElementById('targetPhone').value.trim();
        const extra = document.getElementById('targetExtra').value.trim();
        const output = document.getElementById('output');
        
        if (!name && !user && !phone && !extra) return alert("Data minimal diperlukan.");
        
        output.innerHTML = ""; // Reset
        
        const engines = { "Google": "https://google.com/search?q=", "Yandex": "https://yandex.com/search/?text=", "Duck": "https://duckduckgo.com/?q=" };

        // --- MODULE LOGIC ---
        const addSection = (title) => {
            const div = document.createElement('div');
            div.className = 'module-title';
            div.innerText = title;
            output.appendChild(div);
        };

        const addResult = (title, query) => {
            const card = document.createElement('div');
            card.className = 'result-item';
            let links = '';
            for(let [e, url] of Object.entries(engines)) {
                links += `<a href="${url + encodeURIComponent(query)}" target="_blank">${e}</a>`;
            }
            card.innerHTML = `<h4>${title}</h4><span class="query-preview">${query}</span><div class="engine-bar">${links}</div>`;
            output.appendChild(card);
        };

        // 1. DIGITAL FOOTPRINT (Paling Sering Dipakai)
        addSection("Digital Footprint & Social");
        if(name) addResult("Identity Search", `"${name}"`);
        if(user) addResult("Global Username Search", `allintext:"${user}" -site:instagram.com -site:twitter.com`);
        if(name && extra) addResult("Combined Pivot (Name + Email/NIK)", `"${name}" AND "${extra}"`);

        // 2. LEAKS & SENSITIVE FILES (Pro Level)
        addSection("Technical Leaks & Docs");
        if(name) addResult("Sensitive Documents", `"${name}" filetype:pdf OR filetype:xlsx OR filetype:docx OR filetype:csv`);
        if(user || name) addResult("Server Config/Logs", `intitle:"index of" "${user || name}" OR filetype:log OR filetype:env`);
        if(extra) addResult("Database Leaks Match", `site:pastebin.com OR site:github.com OR site:ghostbin.com "${extra}"`);

        // 3. INDONESIAN GOVERNMENT & PUBLIC DATA
        addSection("ID Govt & Legal Search");
        if(name) {
            addResult("Govt Records (LPSE/KPU)", `site:go.id "${name}"`);
            addResult("Court Records (Putusan MA)", `site:mahkamahagung.go.id "${name}"`);
            addResult("Academic Check (Dikti)", `site:ac.id "${name}"`);
        }

        // 4. FINANCIAL & COMMERCE
        addSection("Financial & Commerce Trace");
        if(phone) {
            let cleanPhone = phone.replace(/\D/g, '');
            addResult("WhatsApp Pivot", `site:wa.me "${phone}" OR "${cleanPhone}"`);
            addResult("E-Commerce Tracker", `site:tokopedia.com OR site:shopee.co.id OR site:olx.co.id "${phone}"`);
        }
        
        window.scrollTo({ top: 500, behavior: 'smooth' });
    }
</script>

</body>
</html>
