<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Command Center v3.0 | Pro Edition</title>
    <style>
        :root {
            --bg-deep: #0b0e14; --bg-panel: #151921; --accent: #00ff41; /* Matrix Green */
            --text-main: #e0e0e0; --text-dim: #888; --danger: #ff4444; --warning: #ffbb33;
        }
        body { font-family: 'Fira Code', monospace, sans-serif; background: var(--bg-deep); color: var(--text-main); margin: 0; font-size: 13px; line-height: 1.5; }
        .container { display: flex; flex-direction: column; height: 100vh; max-width: 1200px; margin: auto; }
        
        /* Sidebar & Layout */
        header { padding: 15px; border-bottom: 1px solid var(--accent); background: var(--bg-panel); display: flex; justify-content: space-between; align-items: center; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .input-sidebar { width: 320px; background: var(--bg-panel); padding: 20px; border-right: 1px solid #222; overflow-y: auto; }
        .content-area { flex: 1; padding: 20px; overflow-y: auto; background: #0d1117; }

        /* Input Styling */
        .field-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: var(--accent); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        input { width: 100%; background: #0b0e14; border: 1px solid #333; padding: 8px; color: var(--accent); border-radius: 3px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 5px rgba(0,255,65,0.3); }

        /* Buttons */
        .btn { cursor: pointer; padding: 10px; border: none; border-radius: 3px; font-weight: bold; text-transform: uppercase; transition: 0.2s; width: 100%; margin-top: 10px; }
        .btn-pro { background: var(--accent); color: #000; }
        .btn-pro:hover { background: #00cc33; box-shadow: 0 0 15px rgba(0,255,65,0.5); }
        .btn-reset { background: #222; color: #888; font-size: 10px; }

        /* Results Display */
        .module-sec { margin-bottom: 25px; }
        .module-header { background: #1c2128; padding: 8px 12px; border-left: 3px solid var(--accent); font-weight: bold; color: var(--accent); display: flex; justify-content: space-between; margin-bottom: 10px; }
        .card { background: var(--bg-panel); border: 1px solid #222; border-radius: 4px; padding: 12px; margin-bottom: 8px; position: relative; }
        .card:hover { border-color: #444; }
        .card h4 { margin: 0 0 5px 0; color: var(--warning); font-size: 12px; }
        .query-box { font-size: 11px; color: #aaa; background: #0b0e14; padding: 5px; border-radius: 3px; display: block; margin: 5px 0; border: 1px dashed #444; overflow-x: auto; }
        
        .links-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
        .links-grid a { padding: 4px 8px; background: #222; border: 1px solid #333; color: var(--text-main); text-decoration: none; font-size: 10px; border-radius: 2px; }
        .links-grid a:hover { background: var(--accent); color: #000; }
        
        .copy-tag { position: absolute; right: 10px; top: 10px; font-size: 9px; background: #333; padding: 2px 5px; cursor: pointer; border-radius: 2px; }

        /* Terminal Style Footer */
        footer { background: #000; padding: 5px 15px; font-size: 10px; color: var(--accent); border-top: 1px solid #222; }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .input-sidebar { width: 100%; border-right: none; border-bottom: 1px solid #222; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div style="font-weight: bold; letter-spacing: 2px;">[ ADVANCED OSINT COMMAND CENTER ]</div>
        <div id="status" style="font-size: 10px; color: var(--accent);">SYSTEM: READY</div>
    </header>

    <div class="main-layout">
        <div class="input-sidebar">
            <div class="field-group">
                <label>Target Full Name</label>
                <input type="text" id="name" placeholder="e.g. Varhan Ardiansyah">
            </div>
            <div class="field-group">
                <label>Primary Username</label>
                <input type="text" id="user" placeholder="e.g. varhan_01">
            </div>
            <div class="field-group">
                <label>Phone Number (Raw)</label>
                <input type="text" id="phone" placeholder="0812xxx">
            </div>
            <div class="field-group">
                <label>Email Address</label>
                <input type="text" id="email" placeholder="target@email.com">
            </div>
            <div class="field-group">
                <label>Location / Org</label>
                <input type="text" id="loc" placeholder="City or School/Company">
            </div>
            <div class="field-group">
                <label>NIK (Indonesian ID)</label>
                <input type="text" id="nik" placeholder="16 Digit">
            </div>
            
            <button class="btn btn-pro" onclick="executeScan()">Execute Full Scan</button>
            <button class="btn btn-reset" onclick="resetForm()">Clear Terminal</button>

            <div style="margin-top: 30px; border-top: 1px solid #333; padding-top: 10px;">
                <label>Notes & Findings</label>
                <textarea id="notes" style="width: 100%; height: 100px; background: #000; color: #00ff41; border: 1px solid #333; font-size: 11px; padding: 5px;" placeholder="Capture dots here..."></textarea>
            </div>
        </div>

        <div class="content-area" id="workspace">
            <div style="text-align: center; margin-top: 100px; opacity: 0.3;">
                <h1>AWAITING TARGET INPUT</h1>
                <p>Enter data in the sidebar to begin reconnaissance.</p>
            </div>
        </div>
    </div>

    <footer>
        LOG: <span id="log-msg">Standby...</span>
    </footer>
</div>

<script>
    // System Initialization
    const log = (msg) => { document.getElementById('log-msg').innerText = msg; };
    const notesBox = document.getElementById('notes');
    notesBox.value = localStorage.getItem('osint_pro_notes') || '';
    notesBox.oninput = () => localStorage.setItem('osint_pro_notes', notesBox.value);

    function resetForm() {
        if(confirm("Wipe all current session data?")) {
            document.querySelectorAll('input').forEach(i => i.value = '');
            document.getElementById('workspace').innerHTML = '';
            log("System Cleaned.");
        }
    }

    function copyVal(text) {
        navigator.clipboard.writeText(text);
        log("Query Copied to Clipboard.");
    }

    function createModule(title) {
        const sec = document.createElement('div');
        sec.className = 'module-sec';
        sec.innerHTML = `<div class="module-header"><span>${title}</span></div>`;
        return sec;
    }

    function createCard(title, dork) {
        const card = document.createElement('div');
        card.className = 'card';
        const engines = {
            "G": "https://www.google.com/search?q=",
            "Y": "https://yandex.com/search/?text=",
            "B": "https://www.bing.com/search?q=",
            "D": "https://duckduckgo.com/?q="
        };

        let engineLinks = '';
        for(let [name, url] of Object.entries(engines)) {
            engineLinks += `<a href="${url + encodeURIComponent(dork)}" target="_blank">${name}</a>`;
        }

        card.innerHTML = `
            <span class="copy-tag" onclick="copyVal('${dork.replace(/'/g, "\\'")}')">COPY</span>
            <h4>${title}</h4>
            <code class="query-box">${dork}</code>
            <div class="links-grid">${engineLinks}</div>
        `;
        return card;
    }

    function executeScan() {
        const data = {
            name: document.getElementById('name').value.trim(),
            user: document.getElementById('user').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            email: document.getElementById('email').value.trim(),
            loc: document.getElementById('loc').value.trim(),
            nik: document.getElementById('nik').value.trim()
        };

        if(!data.name && !data.user && !data.phone && !data.email) {
            alert("Insufficient data for reconnaissance.");
            return;
        }

        const workspace = document.getElementById('workspace');
        workspace.innerHTML = '';
        log("Executing reconnaissance patterns...");

        // --- MODULE 1: IDENTITY FOOTPRINTING ---
        const modIdentity = createModule("MODULE 1: IDENTITY FOOTPRINTING");
        if(data.name) {
            modIdentity.appendChild(createCard("Exact Name Match", `"${data.name}"`));
            modIdentity.appendChild(createCard("Public Documents (PDF/XLS)", `"${data.name}" (filetype:pdf OR filetype:xls OR filetype:doc)`));
        }
        if(data.user) {
            modIdentity.appendChild(createCard("Alias Reconnaissance", `allintext:"${data.user}" -site:instagram.com -site:twitter.com`));
        }
        workspace.appendChild(modIdentity);

        // --- MODULE 2: INDONESIAN PUBLIC SECTOR (OSINT.ID) ---
        const modIndo = createModule("MODULE 2: INDO PUBLIC DATABASE");
        if(data.name) {
            modIndo.appendChild(createCard("Govt Services (LPSE/KPU)", `site:go.id "${data.name}"`));
            modIndo.appendChild(createCard("Academic Records (PDDikti)", `site:ac.id "${data.name}"`));
            modIndo.appendChild(createCard("Legal/Court (Putusan MA)", `site:mahkamahagung.go.id "${data.name}"`));
        }
        if(data.nik) {
            modIndo.appendChild(createCard("NIK Leak Search", `"${data.nik}"`));
        }
        workspace.appendChild(modIndo);

        // --- MODULE 3: FINANCIAL & E-COMMERCE ---
        const modFinance = createModule("MODULE 3: COMMERCE & FINANCIAL");
        if(data.phone || data.user) {
            const pivot = data.phone || data.user;
            modFinance.appendChild(createCard("E-Commerce Seller/Reviewer", `site:tokopedia.com OR site:shopee.co.id OR site:olx.co.id "${pivot}"`));
            modFinance.appendChild(createCard("Forum Activities (Kaskus/Semprot)", `site:kaskus.co.id OR site:modifikasi.com "${pivot}"`));
        }
        workspace.appendChild(modFinance);

        // --- MODULE 4: TECHNICAL DATA & LEAKS (PRO) ---
        const modTechnical = createModule("MODULE 4: DEEP RECON & LEAKS");
        if(data.email) {
            modTechnical.appendChild(createCard("Email on Paste Sites", `site:pastebin.com OR site:ghostbin.com OR site:controlc.com "${data.email}"`));
            modTechnical.appendChild(createCard("Trello/Github Leak", `site:trello.com OR site:github.com OR site:gitlab.com "${data.email}"`));
        }
        if(data.user || data.name) {
            const target = data.user || data.name;
            modTechnical.appendChild(createCard("Directory Listing (Index of)", `intitle:"index of" "${target}"`));
            modTechnical.appendChild(createCard("Exposed Config Files", `filetype:env OR filetype:conf OR filetype:log "${target}"`));
        }
        workspace.appendChild(modTechnical);

        // --- MODULE 5: SOCIAL PIVOTING ---
        const modSocial = createModule("MODULE 5: SOCIAL GRAPH PIVOT");
        if(data.user) {
            const socCard = document.createElement('div');
            socCard.className = 'card';
            socCard.innerHTML = `<h4>Direct Link Pivoting</h4><div class="links-grid">
                <a href="https://www.facebook.com/search/top/?q=${encodeURIComponent(data.name || data.user)}" target="_blank">FB Search</a>
                <a href="https://www.instagram.com/${data.user}" target="_blank">IG Profile</a>
                <a href="https://twitter.com/${data.user}" target="_blank">X Profile</a>
                <a href="https://www.linkedin.com/search/results/all/?keywords=${encodeURIComponent(data.name)}" target="_blank">LinkedIn</a>
            </div>`;
            modSocial.appendChild(socCard);
        }
        workspace.appendChild(modSocial);

        log("Scan Complete. Analyzing connections...");
    }
</script>

</body>
</html>
